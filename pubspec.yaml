name: naru_client
description: Naru - Korean Food Delivery App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.2.4
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  google_maps_flutter: ^2.12.3
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/category_transparent/
    - assets/icons/
    - assets/navigation/
